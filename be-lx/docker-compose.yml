services:
  mysql:
    image: mysql:8.0
    container_name: luuxa_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: luuxa_db
      MYSQL_USER: luuxa_user
      MYSQL_PASSWORD: luuxa_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - luuxa_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luuxa_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "mysql://luuxa_user:luuxa_password@mysql:3306/luuxa_db"
      PORT: 3000
      NODE_ENV: "production"
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm start"
    networks:
      - luuxa_network

volumes:
  mysql_data:

networks:
  luuxa_network:
    driver: bridge
