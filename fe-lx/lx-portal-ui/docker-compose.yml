name: lx-portal-ui

services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lx-portal-ui-dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
    profiles:
      - dev

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    container_name: lx-portal-ui
    ports:
      - "8080:80"
    restart: unless-stopped
    profiles:
      - prod
