name: lx-stack

services:
  mysql:
    image: mysql:8.0
    container_name: lx_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-luuxa_db}
      MYSQL_USER: ${MYSQL_USER:-luuxa_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-luuxa_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD:-password}",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - lx_network

  redis:
    image: redis:7-alpine
    container_name: lx_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - lx_network

  backend:
    image: node:20-alpine
    container_name: lx_backend
    working_dir: /app
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: mysql://${MYSQL_USER:-luuxa_user}:${MYSQL_PASSWORD:-luuxa_password}@mysql:3306/${MYSQL_DATABASE:-luuxa_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "3000:3000"
    volumes:
      - ./be-lx:/app
      - be_node_modules:/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        npm ci --legacy-peer-deps
        npx prisma generate
        until npx prisma db push; do
          echo "Waiting for database schema sync..."
          sleep 3
        done
        npm run dev -- --legacy-watch
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lx_network

  frontend:
    image: node:20-alpine
    container_name: lx_frontend
    working_dir: /app
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./fe-lx/lx-portal-ui:/app
      - fe_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        npm ci --legacy-peer-deps
        npm run dev -- --host 0.0.0.0 --port 5173
    networks:
      - lx_network

volumes:
  mysql_data:
  redis_data:
  be_node_modules:
  fe_node_modules:

networks:
  lx_network:
    driver: bridge
